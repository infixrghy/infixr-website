name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Explicit, locked install. `bun run` auto-installs on the fly, but that
      # path does NOT enforce bun.lock's pinned versions/integrity — for an
      # exact-pinned prerelease (effect@4.0.0-beta.x) it can resolve a different
      # artifact than the lock records, which breaks the build in clean CI.
      # --frozen-lockfile installs exactly what bun.lock says, reproducibly.
      - name: Install dependencies (locked)
        run: bun install --frozen-lockfile

      - name: Build site (src → public)
        run: bun run build.ts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
